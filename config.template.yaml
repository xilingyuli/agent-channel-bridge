applications:
  qq:
    type: napcat
    bot_qq: 'YOUR_BOT_QQ'
    bot_name: MyBot
    ws_url: ws://localhost:3001

routes:
  # 精确匹配（优先级最高）
  qq:private:YOUR_ADMIN_QQ:
    name: MyAgent
    worker: my_agent
    admin: true
  qq:group:YOUR_GROUP_ID:
    name: MyAgent
    worker: my_agent

  # 通配匹配（优先级低于精确）
  qq:private:*:
    name: 通用私聊
    worker: my_agent
  qq:group:*:
    name: 通用群聊
    worker: my_agent
  *:*:*:
    name: 兜底
    worker: my_agent

workers:
  # OpenCode agent (default)
  my_agent:
    name: my_agent
    start_command: opencode acp
    work_dir: /path/to/agent/workspace

  # Claude Code agent (via ACP wrapper)
  claude_agent:
    name: claude_agent
    start_command: python -m agent_channel_bridge.acp_wrapper_claude
    work_dir: /path/to/claude/workspace
    # Requires ANTHROPIC_API_KEY and ANTHROPIC_BASE_URL in environment
